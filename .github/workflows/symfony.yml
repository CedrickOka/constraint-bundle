name: Symfony

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  phpunit:
    strategy:
      fail-fast: false
      matrix:
        include:
          - php_version: "7.4"
            symfony_version: "3.4"
            stability: "stable"
            composer_extra_args: "--ignore-platform-req=ext-mongodb"
          - php_version: "7.4"
            symfony_version: "4.4"
            stability: "stable"
            composer_extra_args: "--ignore-platform-req=ext-mongodb"
          - php_version: "8.1"
            symfony_version: "5.4"
            stability: "stable"
            composer_extra_args: "--ignore-platform-req=ext-mongodb"
          - php_version: "8.1"
            symfony_version: "6.4"
            stability: "stable"
          - php_version: "8.2"
            symfony_version: "7.4"
            stability: "stable"
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.stability == 'dev' }}
    steps:
      - name: Setup PHP, with composer and extensions
#     # To automatically get bug fixes and new Php versions for shivammathur/setup-php,
#     # change this to (see https://github.com/shivammathur/setup-php#bookmark-versioning):
#     # uses: shivammathur/setup-php@v2
        uses: shivammathur/setup-php@2cb9b829437ee246e9b3cac53555a39208ca6d28
        with:
          php-version: ${{ matrix.php_version }}
          coverage: none
          extensions: mbstring, intl, pdo, mongodb
          ini-values: date.timezone=UTC
          tools: composer:v2.2
      - uses: actions/checkout@v6

      - name: symfony/flex is required to install the correct symfony version
        if: ${{ matrix.symfony_version }}
        run: |
            composer global config --no-plugins allow-plugins.symfony/flex true
            composer global require symfony/flex

      - name: Configure Composer stability
        run: |
            composer config minimum-stability ${{ matrix.stability }}

      - name: Configure Symfony version for symfony/flex
        if: ${{ matrix.symfony_version }}
        run: composer config extra.symfony.require "${{ matrix.symfony_version }}.*"

      - name: Install dependencies
        run: |
            composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist ${{ matrix.composer_extra_args }};

      - name: Execute tests (Unit and Feature tests) via PHPUnit
        env:
          SYMFONY_DEPRECATIONS_HELPER: max[direct]=0
          MONGODB_URL: 'mongodb://localhost:27017'
          MONGODB_DB: 'db_name'
        run: ./vendor/bin/simple-phpunit -c phpunit.xml.dist --testdox --coverage-text --colors=never tests/

